services:
  db:
    image: postgres:16-alpine
    container_name: control_accesos_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: control_accesos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: